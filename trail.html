<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UWB Light Trail — 地面站</title>
<style>
/* =============================================
   Fluent Design — 深色主题
   ============================================= */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-dark:       #0a0e14;
  --bg-panel:      rgba(32, 38, 48, 0.82);
  --border-panel:  rgba(255,255,255,0.06);
  --text-primary:  #e8eaed;
  --text-secondary:#9aa0a6;
  --accent:        #4fc3f7;
  --accent-dim:    rgba(79,195,247,0.15);
  --danger:        #f44336;
  --danger-dim:    rgba(244,67,54,0.15);
  --success:       #4caf50;
  --success-dim:   rgba(76,175,80,0.15);
  --warning:       #ff9800;
  --anchor-color:  #5c6bc0;
  --target-color:  #ff5722;
  --font:          'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
  --radius:        8px;
  --acrylic-blur:  24px;
  --panel-w:       260px;
  --panel-gap:     10px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-dark);
  font-family: var(--font);
  color: var(--text-primary);
  user-select: none;
}

/* ---- Canvas ---- */
#trailCanvas {
  display: block;
  width: 100%; height: 100%;
  cursor: crosshair;
}

/* =============================================
   左侧面板容器
   ============================================= */
#leftContainer {
  position: fixed;
  top: 56px; left: 10px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: var(--panel-gap);
  pointer-events: none;
}
#leftContainer > * { pointer-events: auto; }

/* ---- 可折叠面板通用 ---- */
.collapsible-panel {
  background: var(--bg-panel);
  backdrop-filter: blur(var(--acrylic-blur));
  -webkit-backdrop-filter: blur(var(--acrylic-blur));
  border: 1px solid var(--border-panel);
  border-radius: var(--radius);
  overflow: hidden;
  transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  width: var(--panel-w);
  min-width: 0;
  flex-shrink: 0;
  max-height: 1000px;
}

.collapsible-panel.collapsed { width: 36px; max-height: 36px; }

/* ---- 面板头部 ---- */
.panel-header {
  position: relative;
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 8px 0 36px;
  cursor: pointer;
  gap: 6px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-panel);
}
.collapsible-panel.collapsed .panel-header { border-bottom-color: transparent; }
.collapsible-panel.collapsed .panel-header .panel-title { display: none; }
.panel-header .toggle-btn {
  position: absolute;
  left: 8px; top: 8px;
  width: 20px; height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--text-secondary);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.collapsible-panel.collapsed .panel-header .toggle-btn {
  transform: rotate(180deg);
}
.panel-header .panel-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
}

/* ---- 面板内容 ---- */
.panel-body {
  width: 260px;
  min-width: 260px;
  padding: 10px 12px 12px;
  overflow-y: auto;
  overflow-x: hidden;
  transition: opacity 0.25s ease, padding 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.collapsible-panel.collapsed .panel-body {
  padding: 0 12px;
  overflow: hidden;
  opacity: 0;
}

/* =============================================
   控件通用样式
   ============================================= */
.field-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 4px;
  font-size: 12px;
}
.field-row .flabel { color: var(--text-secondary); white-space: nowrap; min-width: 20px; }
.field-row input[type="number"] {
  width: 48px;
  padding: 2px 4px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 11px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.field-row input:focus { border-color: var(--accent); }
.field-row input.offs { width: 48px; color: var(--warning); }
.section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin: 6px 0 4px;
  padding-top: 4px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.section-title:first-child { border-top: none; margin-top: 0; }
.anchor-block {
  margin-bottom: 3px;
  padding: 3px 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.02);
}
.anchor-block .alabel { color: var(--anchor-color); font-weight: 600; font-size: 11px; min-width: 18px; }

/* 基站输入列标题 */
.anchor-header {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 2px;
  padding: 0 4px;
  font-size: 9px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.anchor-header .hblank { min-width: 18px; }
.anchor-header .hxyz { flex: 1; display: flex; gap: 4px; }
.anchor-header .hxyz span { width: 48px; text-align: center; }
.anchor-header .hoff { width: 48px; text-align: center; }

/* ---- 按钮 ---- */
.btn-ctrl {
  display: block;
  width: 100%;
  padding: 8px 0;
  border: none;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.25s, box-shadow 0.25s, transform 0.1s;
  margin-bottom: 6px;
}
.btn-ctrl:active { transform: scale(0.97); }

/* ---- 初始化按钮 ---- */
.btn-reset {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 5px 0;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.btn-reset:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.btn-arm-off  { background: var(--danger-dim); color: var(--danger);  border: 1px solid rgba(244,67,54,0.3); }
.btn-arm-on   { background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,80,0.3); }
.btn-auto-off { background: var(--danger-dim); color: var(--danger);  border: 1px solid rgba(244,67,54,0.3); }
.btn-auto-on  { background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,80,0.3); }

/* ---- 油门 ---- */
.thr-container { margin-top: 2px; }
.thr-container .thr-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-secondary); margin-bottom: 2px;
}
.thr-container input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.12); outline: none;
}
.thr-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 0 8px rgba(79,195,247,0.4);
}
.thr-container input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: none;
}
.thr-value { font-size: 13px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

/* =============================================
   右侧面板容器
   ============================================= */
#rightContainer {
  position: fixed;
  top: 10px; right: 10px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  pointer-events: none;
}
#rightContainer > * { pointer-events: auto; }

/* ---- 信息面板 (可折叠 + 可切换大小) ---- */
#rightContainer .collapsible-panel {
  background: var(--bg-panel);
  backdrop-filter: blur(var(--acrylic-blur));
  -webkit-backdrop-filter: blur(var(--acrylic-blur));
  border: 1px solid var(--border-panel);
  border-radius: var(--radius);
  overflow: hidden;
  transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  width: 185px;
  min-width: 0;
  flex-shrink: 0;
  align-self: flex-end;
  max-height: 1000px;
}
#rightContainer .collapsible-panel.collapsed { width: 36px; max-height: 36px; overflow: hidden; }
#rightContainer .collapsible-panel.collapsed .panel-body { overflow: hidden; }
#rightContainer .collapsible-panel.collapsed .panel-header { padding: 0 8px; justify-content: flex-end; }

/* 放大版 */
#rightContainer .collapsible-panel.info-lg {
  transform: scale(1.75);
  transform-origin: top right;
}

#rightContainer .collapsible-panel.info-sm {
  transform: scale(1.0);
  transform-origin: top right;
}

/* ---- 右侧面板头部 (标题居中，toggle 在右，size 在左) ---- */
#rightContainer .panel-header {
  position: relative;
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 36px;
  cursor: pointer;
  gap: 6px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-panel);
  justify-content: center;
  transition: padding 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
#rightContainer .collapsible-panel.collapsed .panel-header { border-bottom-color: transparent; }
#rightContainer .collapsible-panel.collapsed .panel-header .panel-title { display: none; }
#rightContainer .panel-header .toggle-btn {
  position: absolute;
  left: auto; right: 8px; top: 8px;
  width: 20px; height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--text-secondary);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#rightContainer .collapsible-panel.collapsed .panel-header .toggle-btn {
  transform: rotate(180deg);
}
#rightContainer .panel-header .panel-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-align: center;
}

/* ---- 右侧面板内容 (跟左侧面板一致，但保持原有info样式) ---- */
#rightContainer .panel-body {
  width: 185px;
  min-width: 185px;
  padding: 8px 10px;
  overflow-y: auto;
  overflow-x: hidden;
  max-height: 600px;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, padding 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
#rightContainer .collapsible-panel.collapsed .panel-body {
  max-height: 0;
  padding: 0 10px;
  overflow: hidden;
}

/* ---- 大小切换按钮 ---- */
.size-toggle-btn {
  position: absolute;
  left: 8px; top: 8px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  transition: color 0.2s;
  white-space: nowrap;
  padding: 0 4px;
}
.size-toggle-btn:hover { color: var(--accent); }
.collapsible-panel.collapsed .size-toggle-btn { display: none; }

/* ---- 右侧面板内部样式 (从原infoPanel移植) ---- */
.xyz-row {
  display: flex; justify-content: space-between; gap: 6px; margin-bottom: 6px;
}
.xyz-item { text-align: center; flex: 1; }
.xyz-item .xyz-label {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-secondary);
}
.xyz-item .xyz-value {
  font-size: 16px; font-weight: 700; color: var(--accent);
  font-variant-numeric: tabular-nums; letter-spacing: 0.3px; line-height: 1.3;
}
.info-divider { height: 1px; background: var(--border-panel); margin: 5px 0; }

/* RC */
.rc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px 10px; }
.rc-item { display: flex; justify-content: space-between; font-size: 11px; padding: 1px 0; }
.rc-item .rlab { color: var(--text-secondary); }
.rc-item .rval { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-primary); }

/* 距离 */
.dist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px 10px; }
.dist-item { display: flex; justify-content: space-between; font-size: 11px; padding: 1px 0; }
.dist-item .dlab { color: var(--text-secondary); }
.dist-item .dval { font-weight: 600; font-variant-numeric: tabular-nums; color: #e0c068; }

/* 状态 */
.status-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
#statusDot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
#statusDot.on  { background: var(--success); box-shadow: 0 0 5px var(--success); }
#statusDot.off { background: var(--danger);  box-shadow: 0 0 5px var(--danger);  }
#statusText { font-size: 11px; font-weight: 500; color: var(--text-secondary); }

/* ---- 左上标题 ---- */
#titleBar {
  position: fixed; top: 14px; left: 16px;
  z-index: 25; pointer-events: none;
}
#titleBar h1 {
  font-size: 26px; font-weight: 200; letter-spacing: 3px;
  color: rgba(255,255,255,0.55); text-transform: uppercase;
}
#titleBar h1 strong { font-weight: 700; color: rgba(255,255,255,0.8); }

/* ---- 底部状态栏 ---- */
#statusBar {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: var(--bg-panel);
  backdrop-filter: blur(var(--acrylic-blur));
  -webkit-backdrop-filter: blur(var(--acrylic-blur));
  border: 1px solid var(--border-panel);
  border-radius: 6px;
  padding: 4px 14px;
  font-size: 11px; color: var(--text-secondary);
  z-index: 10; pointer-events: none; white-space: nowrap; letter-spacing: 0.3px;
  display: flex; align-items: center;
}
#statusBar .sep { margin: 0 8px; opacity: 0.3; }

/* =============================================
   3D 模式
   ============================================= */
#trailCanvas3d {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ---- 模式切换 Segmented ---- */
.mode-switch {
  display: inline-flex;
  align-items: center;
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 2px;
  height: 24px;
  cursor: pointer;
  flex-shrink: 0;
  pointer-events: auto;
}
.mode-opt {
  position: relative;
  z-index: 1;
  padding: 0 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  line-height: 20px;
  transition: color 0.3s;
  user-select: none;
}
.mode-opt.active { color: var(--text-primary); }
.mode-slider {
  position: absolute;
  top: 2px; left: 2px;
  width: calc(50% - 2px);
  height: calc(100% - 4px);
  background: var(--accent-dim);
  border: 1px solid rgba(79,195,247,0.3);
  border-radius: 12px;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.mode-switch[data-mode="3d"] .mode-slider {
  transform: translateX(100%);
}

/* ---- 测距连线开关 ---- */
.dist-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
}
.dist-toggle input[type="checkbox"] {
  accent-color: var(--accent);
}
</style>
</head>
<body>

<div id="titleBar"><h1><strong>UWB</strong> Light Trail</h1></div>

<!-- =============================================
     左侧面板
     ============================================= -->
<div id="leftContainer">

  <!-- █ 校准组 -->
  <div class="collapsible-panel" id="calibPanel">
    <div class="panel-header" onclick="togglePanel('calibPanel')">
      <span class="toggle-btn">&#9664;</span>
      <span class="panel-title">校准</span>
    </div>
    <div class="panel-body">
      <div class="section-title">目标点</div>
      <div class="field-row">
        <span class="flabel">X</span>
        <input type="number" id="tgtX" step="0.1" value="2.0">
        <span class="flabel" style="margin-left:4px">Y</span>
        <input type="number" id="tgtY" step="0.1" value="2.0">
        <span class="flabel" style="margin-left:4px">Z</span>
        <input type="number" id="tgtZ" step="0.1" value="1.0">
      </div>
      <div class="section-title">基站 &amp; 误差修正</div>
      <div class="anchor-header">
        <span class="hblank"></span>
        <div class="hxyz"><span>X</span><span>Y</span><span>Z</span></div>
        <span class="hoff">偏移</span>
      </div>
      <div id="anchorInputs"></div>
      <button class="btn-reset" id="btnReset">初始化默认值</button>
      <label class="dist-toggle">
        <input type="checkbox" id="showDistLines"> 显示测距连线
      </label>
    </div>
  </div>

  <!-- █ 控制组 -->
  <div class="collapsible-panel" id="ctrlPanel">
    <div class="panel-header" onclick="togglePanel('ctrlPanel')">
      <span class="toggle-btn">&#9664;</span>
      <span class="panel-title">控制</span>
    </div>
    <div class="panel-body">
      <button class="btn-ctrl btn-arm-off" id="btnArm">解锁</button>
      <button class="btn-ctrl btn-auto-off" id="btnAuto" disabled>自动驾驶</button>
      <div class="section-title" style="margin-top:8px">悬停油门</div>
      <div class="thr-container">
        <div class="thr-label">
          <span>基准</span>
          <span class="thr-value" id="thrDisplay">1300</span>
        </div>
        <input type="range" id="thrSlider" min="1000" max="2000" value="1300">
      </div>
    </div>
  </div>
</div>

<!-- =============================================
     右侧信息面板 (可折叠 + 可缩放)
     ============================================= -->
<div id="rightContainer">
  <div class="collapsible-panel info-lg" id="infoPanel">
    <div class="panel-header" onclick="togglePanel('infoPanel')">
      <button class="size-toggle-btn" id="infoSizeBtn" onclick="event.stopPropagation(); toggleInfoSize();">缩小</button>
      <span class="panel-title">仪表盘</span>
      <span class="toggle-btn">&#9654;</span>
    </div>
    <div class="panel-body">
      <div class="xyz-row">
        <div class="xyz-item"><div class="xyz-label">X</div><div class="xyz-value" id="valX">—</div></div>
        <div class="xyz-item"><div class="xyz-label">Y</div><div class="xyz-value" id="valY">—</div></div>
        <div class="xyz-item"><div class="xyz-label">Z</div><div class="xyz-value" id="valZ">—</div></div>
      </div>
      <div class="info-divider"></div>
      <div class="rc-grid">
        <div class="rc-item"><span class="rlab">Roll</span><span class="rval" id="rcRoll">1500</span></div>
        <div class="rc-item"><span class="rlab">Pitch</span><span class="rval" id="rcPitch">1500</span></div>
        <div class="rc-item"><span class="rlab">Yaw</span><span class="rval" id="rcYaw">1500</span></div>
        <div class="rc-item"><span class="rlab">Throttle</span><span class="rval" id="rcThrottle">1000</span></div>
      </div>
      <div class="info-divider"></div>
      <div class="dist-grid">
        <div class="dist-item"><span class="dlab">Δ0</span><span class="dval" id="d0">—</span></div>
        <div class="dist-item"><span class="dlab">Δ1</span><span class="dval" id="d1">—</span></div>
        <div class="dist-item"><span class="dlab">Δ2</span><span class="dval" id="d2">—</span></div>
        <div class="dist-item"><span class="dlab">Δ3</span><span class="dval" id="d3">—</span></div>
      </div>
      <div class="info-divider"></div>
      <div class="status-row">
        <span id="statusDot" class="off"></span>
        <span id="statusText">等待数据…</span>
      </div>
    </div>
  </div>
</div>

<!-- 底部 -->
<div id="statusBar">
  <div class="mode-switch" id="modeSwitch" data-mode="2d">
    <span class="mode-opt active" data-mode="2d">2D</span>
    <span class="mode-opt" data-mode="3d">3D</span>
    <span class="mode-slider"></span>
  </div>
  <span class="sep">|</span>
  <span id="fpsDisplay">0 FPS</span>
  <span class="sep">|</span>
  <span id="trailPoints">尾迹 0 点</span>
</div>

<!-- Canvas -->
<canvas id="trailCanvas"></canvas>
<canvas id="trailCanvas3d"></canvas>

<script>
// =============================================
//  UWB Light Trail — 地面站引擎
// =============================================

(function() {
  'use strict';

  /* ---- DOM ---- */
  const canvas = document.getElementById('trailCanvas');
  const ctx = canvas.getContext('2d');

  const elX        = document.getElementById('valX');
  const elY        = document.getElementById('valY');
  const elZ        = document.getElementById('valZ');
  const elDot      = document.getElementById('statusDot');
  const elStatTx   = document.getElementById('statusText');
  const elFps      = document.getElementById('fpsDisplay');
  const elTrailPts = document.getElementById('trailPoints');
  const elBtnArm   = document.getElementById('btnArm');
  const elBtnAuto  = document.getElementById('btnAuto');
  const elThrSld   = document.getElementById('thrSlider');
  const elThrDsp   = document.getElementById('thrDisplay');

  /* ---- 坐标 ---- */
  const RMIN = -1, RMAX = 6, RSIZE = RMAX - RMIN;

  /* ---- 状态 ---- */
  const S = {
    dx: 0, dy: 0, dz: 0,
    sx: 0, sy: 0, sz: 0,
    tx: 2.0, ty: 2.0, tz: 1.0,
    fetchT: 0,
    rcR:1500, rcP:1500, rcY:1500, rcT:1000,
    r0:0,r1:0,r2:0,r3:0,
    armed: false, auto: false,
    thr: 1300,
    anchors: [[0,0,0.5],[0,4,2.5],[4,4,0.5],[4,0,2.5]],
    off: [0,0,0,0],
    connected: false,
    fc:0, ft:0, fps:0,
  };

  const TRAIL_MS = 2000;
  let trail = [];

  let dpr=1, W=0, H=0;
  const PAD = {t:50,b:30,l:50,r:20};
  let px=0, py=0, pw=0, ph=0, sc=1;

  /* ==========================================
     尺寸
     ========================================== */
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.scale(dpr,dpr);
    px=PAD.l; py=PAD.t; pw=W-PAD.l-PAD.r; ph=H-PAD.t-PAD.b;
    sc = Math.min(pw,ph)/RSIZE;
    if (renderer) {
      renderer.setSize(W, H);
      renderer.setPixelRatio(dpr);
      if (camera3d) { camera3d.aspect = W / H; camera3d.updateProjectionMatrix(); }
    }
  }

  function toC(rx,ry) {
    return {
      x: px + (rx-RMIN)*sc + (pw-sc*RSIZE)/2,
      y: py + (RMAX-ry)*sc + (ph-sc*RSIZE)/2
    };
  }

  /* ==========================================
     数据
     ========================================== */
  async function fetchSt() {
    try {
      const r = await fetch('/api/state');
      if (!r.ok) throw Error();
      const d = await r.json();
      S.sx=d.x; S.sy=d.y; S.sz=d.z;
      S.tx=d.target_x; S.ty=d.target_y; S.tz=d.target_z;
      S.rcR=d.rc_roll; S.rcP=d.rc_pitch; S.rcY=d.rc_yaw; S.rcT=d.rc_throttle;
      S.r0=d.r0; S.r1=d.r1; S.r2=d.r2; S.r3=d.r3;
      S.armed=d.is_armed; S.auto=d.auto_mode;
      S.thr = d.throttle;
      if (d.anchors) S.anchors = d.anchors;
      S.off = [d.offset_r0,d.offset_r1,d.offset_r2,d.offset_r3];
      S.fetchT = performance.now();
      if (!S.connected) {
        S.connected=true;
        // 首次连接时用后端值初始化目标输入框
        document.getElementById('tgtX').value = S.tx.toFixed(1);
        document.getElementById('tgtY').value = S.ty.toFixed(1);
        document.getElementById('tgtZ').value = S.tz.toFixed(1);
        updateUI();
      }
      syncArmUI(); syncAutoUI(); syncAutoEnabled();
      elThrSld.value = S.thr;
      elThrDsp.textContent = S.thr;
    } catch(_) {
      if (S.connected) { S.connected=false; updateUI(); }
    }
  }

  async function postSt(p) {
    try { await fetch('/api/state', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) }); }
    catch(_) {}
  }

  /* ==========================================
     面板控件
     ========================================== */
  window.togglePanel = function(id) {
    const el = document.getElementById(id);
    const body = el.querySelector('.panel-body');
    if (el.classList.contains('collapsed')) {
      body.style.overflowY = 'hidden';
      el.classList.remove('collapsed');
      setTimeout(() => { body.style.overflowY = 'auto'; }, 360);
    } else {
      body.style.overflowY = 'hidden';
      el.classList.add('collapsed');
    }
  };

  window.toggleInfoSize = function() {
    const el = document.getElementById('infoPanel');
    el.classList.toggle('info-lg');
    el.classList.toggle('info-sm');
    const btn = document.getElementById('infoSizeBtn');
    if (el.classList.contains('info-lg')) {
      btn.textContent = '缩小';
    } else {
      btn.textContent = '放大';
    }
  };

  function buildAnchors() {
    const c = document.getElementById('anchorInputs');
    c.innerHTML = '';
    for (let i=0;i<4;i++) {
      const d = document.createElement('div');
      d.className = 'anchor-block';
      d.innerHTML =
        `<div class="field-row">` +
        `<span class="alabel">A${i}</span>` +
        `<input type="number" step="0.1" value="${S.anchors[i][0]}" data-xyza="${i},0">` +
        `<input type="number" step="0.1" value="${S.anchors[i][1]}" data-xyza="${i},1">` +
        `<input type="number" step="0.1" value="${S.anchors[i][2]}" data-xyza="${i},2">` +
        `<input type="number" step="0.01" class="offs" value="${S.off[i]}" data-off="${i}">` +
        `</div>`;
      d.querySelectorAll('[data-xyza]').forEach(el => {
        el.addEventListener('change', function() {
          const [ai,aj] = this.dataset.xyza.split(',').map(Number);
          S.anchors[ai][aj] = parseFloat(this.value)||0;
          postSt({ anchors: S.anchors.map(a=>[a[0],a[1],a[2]]) });
        });
      });
      d.querySelectorAll('[data-off]').forEach(el => {
        el.addEventListener('change', function() {
          const idx = Number(this.dataset.off);
          S.off[idx] = parseFloat(this.value)||0;
          const p = {}; p['offset_r'+idx] = S.off[idx]; postSt(p);
        });
      });
      c.appendChild(d);
    }
  }

  /* 初始化默认值 */
  function resetDefaults() {
    // 目标点
    postSt({ target_x: 2.0, target_y: 2.0, target_z: 1.0 });
    S.tx = 2.0; S.ty = 2.0; S.tz = 1.0;
    document.getElementById('tgtX').value = '2.0';
    document.getElementById('tgtY').value = '2.0';
    document.getElementById('tgtZ').value = '1.0';
    // 基站
    const defAnchors = [[0,0,0.5],[0,4,2.5],[4,4,0.5],[4,0,2.5]];
    postSt({ anchors: defAnchors, offset_r0:0, offset_r1:0, offset_r2:0, offset_r3:0 });
    S.anchors = defAnchors;
    S.off = [0,0,0,0];
    // 重建基站输入框
    buildAnchors();
  }

  /* 目标 */
  function setupTargetInputs() {
    ['tgtX','tgtY','tgtZ'].forEach(id => {
      document.getElementById(id).addEventListener('change', function() {
        const k = this.id.replace('tgt','target_').toLowerCase();
        const v = parseFloat(this.value)||0;
        // 立即更新本地状态，Canvas 目标星马上响应
        if (k === 'target_x') S.tx = v;
        else if (k === 'target_y') S.ty = v;
        else if (k === 'target_z') S.tz = v;
        const p = {}; p[k] = v; postSt(p);
      });
    });
  }

  /* 控制 */
  function setupControls() {
    elBtnArm.addEventListener('click', function() {
      if (!S.armed && S.thr > 1050) return;
      if (S.armed) {
        // 锁定：与旧GUI保持一致——关闭自动驾驶、手动油门归零
        postSt({ is_armed: false, auto_mode: false, throttle: 1000 });
        S.armed = false;
        S.auto = false;
        S.thr = 1000;
        elThrSld.value = 1000;
        elThrDsp.textContent = '1000';
        syncAutoUI();
      } else {
        // 解锁：油门必须 <= 1050
        if (S.thr > 1050) return;
        postSt({ is_armed: true });
        S.armed = true;
      }
      syncArmUI(); syncAutoEnabled();
    });
    elBtnAuto.addEventListener('click', function() {
      if (!S.armed) return;
      const nv = !S.auto;
      postSt({ auto_mode: nv });
      S.auto = nv;
      syncAutoUI();
    });
    elThrSld.addEventListener('input', function() {
      const v = parseInt(this.value);
      S.thr = v; elThrDsp.textContent = v;
      postSt({ throttle: v });
    });
  }

  /* ==========================================
     UI 同步
     ========================================== */
  function syncUI() {
    elThrSld.value = S.thr; elThrDsp.textContent = S.thr;
    syncArmUI(); syncAutoUI(); syncAutoEnabled();
    if (S.connected) { elDot.className='on'; elStatTx.textContent='已连接'; syncAutoEnabled(); }
    else { elDot.className='off'; elStatTx.textContent='连接断开'; }
  }

  function syncArmUI() {
    if (S.armed) { elBtnArm.className='btn-ctrl btn-arm-on'; elBtnArm.textContent='锁定'; }
    else { elBtnArm.className='btn-ctrl btn-arm-off'; elBtnArm.textContent='解锁'; }
  }

  function syncAutoUI() {
    if (S.auto) { elBtnAuto.className='btn-ctrl btn-auto-on'; elBtnAuto.textContent='关闭自动驾驶'; }
    else { elBtnAuto.className='btn-ctrl btn-auto-off'; elBtnAuto.textContent='开启自动驾驶'; }
  }

  function syncAutoEnabled() {
    elBtnAuto.disabled = !S.armed;
    elBtnAuto.style.opacity = S.armed?'1':'0.35';
  }

  function updateUI() {
    if (S.connected) { elDot.className='on'; elStatTx.textContent='已连接'; }
    else { elDot.className='off'; elStatTx.textContent='连接断开'; }
  }

  /* ==========================================
     绘图
     ========================================== */
  function draw(now) {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,W,H);

    drawGrid();
    drawAnchors();
    drawTarget();
    drawTrail(now);
    drawSphere();
  }

  function drawGrid() {
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    const f='10px '+getComputedStyle(document.body).fontFamily;
    ctx.font=f; ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.textAlign='center'; ctx.textBaseline='top';
    for (let v=RMIN;v<=RMAX;v++) {
      const p=toC(v,0);
      ctx.beginPath();ctx.moveTo(p.x,py);ctx.lineTo(p.x,py+ph);ctx.stroke();
      ctx.fillText(v.toFixed(0),p.x,py+ph+6);
      ctx.beginPath();ctx.moveTo(px,p.y);ctx.lineTo(px+pw,p.y);ctx.stroke();
      ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(v.toFixed(0),px-6,p.y);
      ctx.textAlign='center';ctx.textBaseline='top';
    }
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1.2;
    const o=toC(0,0);
    ctx.beginPath();ctx.moveTo(px,o.y);ctx.lineTo(px+pw,o.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x,py);ctx.lineTo(o.x,py+ph);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font=f;
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('X',px+pw+3,o.y-5);
    ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('Y',o.x-5,py-3);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='9px '+getComputedStyle(document.body).fontFamily;
    ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('(0,0)',o.x-3,o.y+3);
    ctx.restore();
  }

  function drawAnchors() {
    const lb=['A0','A1','A2','A3'];
    S.anchors.forEach((p,i)=>{
      const c=toC(p[0],p[1]);
      if (c.x<px-20||c.x>px+pw+20||c.y<py-20||c.y>py+ph+20) return;
      ctx.save();
      const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,16);
      g.addColorStop(0,'rgba(92,107,192,0.2)');g.addColorStop(1,'rgba(92,107,192,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(c.x,c.y,16,0,Math.PI*2);ctx.fill();
      const sz=9;ctx.fillStyle='#5c6bc0';ctx.shadowColor='rgba(92,107,192,0.4)';ctx.shadowBlur=6;
      ctx.fillRect(c.x-sz/2,c.y-sz/2,sz,sz);ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px '+getComputedStyle(document.body).fontFamily;
      ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(lb[i],c.x,c.y-sz/2-3);
      ctx.restore();
    });
  }

  function drawTarget() {
    const tx=S.tx||2, ty=S.ty||2;
    const c=toC(tx,ty);
    if (c.x<px-30||c.x>px+pw+30||c.y<py-30||c.y>py+ph+30) return;
    ctx.save();
    const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,22);
    g.addColorStop(0,'rgba(255,87,34,0.2)');g.addColorStop(1,'rgba(255,87,34,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(c.x,c.y,22,0,Math.PI*2);ctx.fill();
    const rO=11,rI=5;
    ctx.beginPath();
    for (let i=0;i<10;i++) {
      const a=-Math.PI/2+i*Math.PI/5, rr=i%2===0?rO:rI;
      const x=c.x+rr*Math.cos(a), y=c.y+rr*Math.sin(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.shadowColor='rgba(255,87,34,0.5)';ctx.shadowBlur=10;
    ctx.fillStyle='#ff5722';ctx.fill();ctx.shadowBlur=0;
    ctx.restore();
  }

  function drawTrail(now) {
    const n=trail.length; if (n<2) return; ctx.save();
    for (let i=1;i<n;i++) {
      const p0=trail[i-1],p1=trail[i], age=now-p1.time, t=Math.max(0,Math.min(1,age/TRAIL_MS));
      const a=Math.pow(1-t,1.5), w=Math.pow(1-t,1.8)*7;
      if (w<0.4||a<0.01) continue;
      ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);
      ctx.strokeStyle=`rgba(79,195,247,${a})`;ctx.lineWidth=w;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    }
    ctx.restore();
  }

  function drawSphere() {
    const c=toC(S.dx,S.dy);
    if (c.x<px-50||c.x>px+pw+50||c.y<py-50||c.y>py+ph+50) return;
    ctx.save(); const r=13;
    const g=ctx.createRadialGradient(c.x,c.y,r*0.2,c.x,c.y,r*3);
    g.addColorStop(0,'rgba(79,195,247,0.25)');g.addColorStop(0.5,'rgba(79,195,247,0.06)');g.addColorStop(1,'rgba(79,195,247,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(c.x,c.y,r*3,0,Math.PI*2);ctx.fill();
    const gr=ctx.createRadialGradient(c.x-r*0.3,c.y-r*0.3,r*0.1,c.x,c.y,r);
    gr.addColorStop(0,'#b3e5fc');gr.addColorStop(0.4,'#4fc3f7');gr.addColorStop(0.85,'#0288d1');gr.addColorStop(1,'#01579b');
    ctx.shadowColor='rgba(79,195,247,0.5)';ctx.shadowBlur=16;ctx.fillStyle=gr;
    ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    const hl=ctx.createRadialGradient(c.x-r*0.3,c.y-r*0.35,0,c.x-r*0.3,c.y-r*0.35,r*0.5);
    hl.addColorStop(0,'rgba(255,255,255,0.45)');hl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=hl;ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  /* ==========================================
     拖拽 (Canvas 鼠标事件)
     ========================================== */
  function toWorld(cx, cy) {
    const rx = (cx - px - (pw - sc*RSIZE)/2) / sc + RMIN;
    const ry = RMAX - (cy - py - (ph - sc*RSIZE)/2) / sc;
    return { x: rx, y: ry };
  }

  let dragTarget = null; // null | 'target' | 'anchor_0' | 'anchor_1' | ...

  function onPointerDown(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    const w = toWorld(mx, my);

    // 点击目标点 (红色星)
    const t = toC(S.tx, S.ty);
    if (Math.hypot(mx - t.x, my - t.y) < 20) {
      dragTarget = 'target';
      return;
    }
    // 点击基站
    for (let i = 0; i < S.anchors.length; i++) {
      const a = toC(S.anchors[i][0], S.anchors[i][1]);
      if (Math.hypot(mx - a.x, my - a.y) < 18) {
        dragTarget = 'anchor_' + i;
        return;
      }
    }
  }

  function onPointerMove(e) {
    if (!dragTarget) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    const w = toWorld(mx, my);

    if (dragTarget === 'target') {
      S.tx = Math.max(RMIN, Math.min(RMAX, w.x));
      S.ty = Math.max(RMIN, Math.min(RMAX, w.y));
      document.getElementById('tgtX').value = S.tx.toFixed(1);
      document.getElementById('tgtY').value = S.ty.toFixed(1);
      // 防抖后 POST
      postSt({ target_x: S.tx, target_y: S.ty });
    } else if (dragTarget && dragTarget.startsWith('anchor_')) {
      const idx = parseInt(dragTarget.split('_')[1]);
      S.anchors[idx][0] = Math.max(RMIN, Math.min(RMAX, w.x));
      S.anchors[idx][1] = Math.max(RMIN, Math.min(RMAX, w.y));
      // 更新左侧输入框
      const inputs = document.querySelectorAll('#anchorInputs input[data-xyza]');
      inputs.forEach(inp => {
        const [ai, aj] = inp.dataset.xyza.split(',').map(Number);
        if (ai === idx) inp.value = S.anchors[ai][aj].toFixed(1);
      });
      postSt({ anchors: S.anchors.map(a => [a[0], a[1], a[2]]) });
    }
  }

  function onPointerUp(e) {
    dragTarget = null;
  }

  /* ==========================================
     主循环
     ========================================== */
  const LERP = 0.13;

  function tick(ts) {
    const dx=S.sx-S.dx, dy=S.sy-S.dy, dz=S.sz-S.dz;
    if (Math.hypot(dx,dy,dz)>0.001) { S.dx+=dx*LERP; S.dy+=dy*LERP; S.dz+=dz*LERP; }
    else { S.dx=S.sx; S.dy=S.sy; S.dz=S.sz; }

    // 2D 尾迹 (仅 2D 模式)
    if (!mode3d) {
      const p=toC(S.dx,S.dy);
      trail.push({x:p.x,y:p.y,time:ts});
      const cut=ts-TRAIL_MS; let lo=0, hi=trail.length;
      while (lo<hi) { const m=(lo+hi)>>>1; if (trail[m].time<cut) lo=m+1; else hi=m; }
      if (lo>0) trail.splice(0,lo);
    }

    if (S.connected && ts-S.fetchT>3000) { S.connected=false; syncUI(); }

    // 渲染
    if (mode3d || switchingTo2d) { render3d(ts); }
    else { draw(ts); }

    // 信息面板 (始终更新)
    if (S.connected) {
      elX.textContent = S.sx.toFixed(2)+' m';
      elY.textContent = S.sy.toFixed(2)+' m';
      elZ.textContent = S.sz.toFixed(2)+' m';
      document.getElementById('rcRoll').textContent = S.rcR;
      document.getElementById('rcPitch').textContent = S.rcP;
      document.getElementById('rcYaw').textContent = S.rcY;
      document.getElementById('rcThrottle').textContent = Math.round(S.rcT);
      document.getElementById('d0').textContent = S.r0.toFixed(2)+' m';
      document.getElementById('d1').textContent = S.r1.toFixed(2)+' m';
      document.getElementById('d2').textContent = S.r2.toFixed(2)+' m';
      document.getElementById('d3').textContent = S.r3.toFixed(2)+' m';
    }

    // FPS
    S.fc++;
    if (ts-S.ft>=1000) { S.fps=S.fc; S.fc=0; S.ft=ts; elFps.textContent=S.fps+' FPS'; }
    elTrailPts.textContent='尾迹 '+trail.length+' 点';

    requestAnimationFrame(tick);
  }

  /* ==========================================
     3D 引擎 (Three.js 懒加载)
     ========================================== */
  let mode3d = false;
  let threeLoaded = false, threeLoading = false, threeLoadError = false;
  let scene, camera3d, renderer, controls3d;
  let anchorMeshes = [], anchorSprites = [];
  let targetMesh, targetSprite;
  let tagMesh, tagGlow, projLine;
  let trailLine3d;
  let distLineMeshes = [];
  let showDistLines = false;
  const TRAIL3D_MAX = 600;
  let trail3dData = [];
  let camAnim = null;

  /* 坐标映射: 物理 [x,y,z] → Three.js [x, z, -y] (Y-up), Z 取反使物理+Y在透视中朝上 */
  function p2t(x, y, z) { return [x, z, -y]; }

  function loadThreeJS() {
    return new Promise((resolve, reject) => {
      if (threeLoaded) { resolve(); return; }
      if (threeLoadError) { reject(); return; }
      if (threeLoading) {
        const chk = setInterval(() => {
          if (threeLoaded) { clearInterval(chk); resolve(); }
          if (threeLoadError) { clearInterval(chk); reject(); }
        }, 100);
        return;
      }
      threeLoading = true;
      const s1 = document.createElement('script');
      s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
      s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
        s2.onload = () => { threeLoaded = true; initScene3d(); resolve(); };
        s2.onerror = () => { threeLoadError = true; console.error('OrbitControls 加载失败'); reject(); };
        document.head.appendChild(s2);
      };
      s1.onerror = () => { threeLoadError = true; console.error('Three.js 加载失败'); reject(); };
      document.head.appendChild(s1);
    });
  }

  function initScene3d() {
    const THREE = window.THREE;
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e14);
    scene.fog = new THREE.FogExp2(0x0a0e14, 0.035);

    camera3d = new THREE.PerspectiveCamera(45, W / H, 0.1, 200);
    camera3d.position.set(2.5, 24, -2.0);
    camera3d.up.set(0, 1, 0);

    const c3d = document.getElementById('trailCanvas3d');
    renderer = new THREE.WebGLRenderer({ canvas: c3d, antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(dpr);

    controls3d = new THREE.OrbitControls(camera3d, renderer.domElement);
    controls3d.target.set(2.5, 0, -2.0);
    controls3d.enableDamping = true;
    controls3d.dampingFactor = 0.08;
    controls3d.maxPolarAngle = Math.PI / 2.05;
    controls3d.minDistance = 2;
    controls3d.maxDistance = 30;
    controls3d.enabled = false;

    buildGroundGrid3d();
    buildAxes3d();
    buildAnchors3d();
    buildTarget3d();
    buildTag3d();
    buildTrail3d();
    buildDistLines3d();

    /* 光照 */
    scene.add(new THREE.AmbientLight(0x404060, 0.8));
    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
    dir.position.set(5, 10, 5);
    scene.add(dir);
  }

  function get2dLikeCameraState() {
    const center = (RMIN + RMAX) / 2;  // 2.5
    return {
      pos: new THREE.Vector3(center, 30, -2.0),
      target: new THREE.Vector3(center, 0, -2.0),
      fov: 16,
      up: new THREE.Vector3(0, 0, -1)
    };
  }

  function get3dDefaultCameraState() {
    const center = (RMIN + RMAX) / 2;
    return {
      pos: new THREE.Vector3(8, 7, 8),
      target: new THREE.Vector3(center, 0, -2.0),
      fov: 45,
      up: new THREE.Vector3(0, 1, 0)
    };
  }

  function setCameraState(state) {
    camera3d.position.copy(state.pos);
    controls3d.target.copy(state.target);
    if (state.up) camera3d.up.copy(state.up);
    camera3d.fov = state.fov;
    camera3d.updateProjectionMatrix();
    controls3d.update();
  }

  function buildGroundGrid3d() {
    const THREE = window.THREE;
    const grid = new THREE.GridHelper(9, 18, 0x3a4a5a, 0x1a2a3a);
    grid.position.set(2.5, 0, -2.0);
    scene.add(grid);
    const geo = new THREE.PlaneGeometry(9, 9);
    const mat = new THREE.MeshBasicMaterial({ color: 0x0d1117, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    const ground = new THREE.Mesh(geo, mat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.set(2.5, -0.01, -2.0);
    scene.add(ground);
  }

  function buildAxes3d() {
    const THREE = window.THREE;
    const mk = (from, to, color) => {
      const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...from), new THREE.Vector3(...to)]);
      return new THREE.Line(g, new THREE.LineBasicMaterial({ color }));
    };
    scene.add(mk([0,0,0],[7,0,0],0xff4444));
    scene.add(mk([0,0,0],[0,0,-7],0x44ff44));
    scene.add(mk([0,0,0],[0,5,0],0x4488ff));
  }

  function makeSprite3d(text, color) {
    const THREE = window.THREE;
    const cv = document.createElement('canvas'); cv.width = 256; cv.height = 64;
    const c = cv.getContext('2d');
    c.font = 'bold 32px Segoe UI, sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillStyle = color || '#fff'; c.fillText(text, 128, 32);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sp = new THREE.Sprite(mat); sp.scale.set(1.6, 0.4, 1);
    return sp;
  }

  function buildAnchors3d() {
    const THREE = window.THREE;
    for (let i = 0; i < 4; i++) {
      const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
      const mat = new THREE.MeshPhongMaterial({ color: 0x5c6bc0, emissive: 0x2a2f5a });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh); anchorMeshes.push(mesh);
      const sp = makeSprite3d('A' + i, '#5c6bc0');
      scene.add(sp); anchorSprites.push(sp);
    }
    updateAnchorPos3d();
  }

  function updateAnchorPos3d() {
    for (let i = 0; i < 4; i++) {
      const a = S.anchors[i], p = p2t(a[0], a[1], a[2]);
      anchorMeshes[i].position.set(p[0], p[1], p[2]);
      anchorSprites[i].position.set(p[0], p[1] + 0.5, p[2]);
    }
  }

  function buildTarget3d() {
    const THREE = window.THREE;
    const geo = new THREE.SphereGeometry(0.125, 24, 24);
    const mat = new THREE.MeshPhongMaterial({ color: 0xff5722, emissive: 0x661a0a });
    targetMesh = new THREE.Mesh(geo, mat); scene.add(targetMesh);
    targetSprite = makeSprite3d('Target', '#ff5722'); scene.add(targetSprite);
    updateTargetPos3d();
  }

  function updateTargetPos3d() {
    const p = p2t(S.tx, S.ty, S.tz);
    targetMesh.position.set(p[0], p[1], p[2]);
    targetSprite.position.set(p[0], p[1] + 0.6, p[2]);
  }

  function buildTag3d() {
    const THREE = window.THREE;
    const geo = new THREE.SphereGeometry(0.14, 24, 24);
    const mat = new THREE.MeshPhongMaterial({ color: 0x4fc3f7, emissive: 0x1a4a5a, shininess: 80 });
    tagMesh = new THREE.Mesh(geo, mat); scene.add(tagMesh);
    const gGeo = new THREE.SphereGeometry(0.28, 16, 16);
    const gMat = new THREE.MeshBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.15 });
    tagGlow = new THREE.Mesh(gGeo, gMat); scene.add(tagGlow);
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(6), 3));
    const pMat = new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.3 });
    projLine = new THREE.Line(pGeo, pMat); scene.add(projLine);
  }

  function updateTagPos3d() {
    const p = p2t(S.dx, S.dy, S.dz);
    tagMesh.position.set(p[0], p[1], p[2]);
    tagGlow.position.set(p[0], p[1], p[2]);
    const pos = projLine.geometry.attributes.position;
    pos.setXYZ(0, p[0], p[1], p[2]);
    pos.setXYZ(1, p[0], 0, p[2]);
    pos.needsUpdate = true;
  }

  function buildTrail3d() {
    const THREE = window.THREE;
    const positions = new Float32Array(TRAIL3D_MAX * 3);
    const colors = new Float32Array(TRAIL3D_MAX * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geo.setDrawRange(0, 0);
    /* 圆形纹理 */
    const cv = document.createElement('canvas'); cv.width = 32; cv.height = 32;
    const c = cv.getContext('2d');
    const g = c.createRadialGradient(16, 16, 0, 16, 16, 16);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.8)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = g; c.fillRect(0, 0, 32, 32);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.PointsMaterial({
      size: 0.14,
      map: tex,
      transparent: true,
      opacity: 0.9,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });
    trailLine3d = new THREE.Points(geo, mat); scene.add(trailLine3d);
  }

  function updateTrail3d(now) {
    if (S.connected) {
      const p = p2t(S.dx, S.dy, S.dz);
      trail3dData.push({ x: p[0], y: p[1], z: p[2], time: now });
    }
    const cut = now - TRAIL_MS;
    while (trail3dData.length > 0 && trail3dData[0].time < cut) trail3dData.shift();
    if (trail3dData.length > TRAIL3D_MAX) trail3dData.splice(0, trail3dData.length - TRAIL3D_MAX);
    const n = trail3dData.length;
    const pos = trailLine3d.geometry.attributes.position;
    const col = trailLine3d.geometry.attributes.color;
    for (let i = 0; i < n; i++) {
      const d = trail3dData[i];
      pos.setXYZ(i, d.x, d.y, d.z);
      const fade = Math.pow(1 - (now - d.time) / TRAIL_MS, 1.5);
      col.setXYZ(i, 0.31 * fade, 0.76 * fade, 0.97 * fade);
    }
    trailLine3d.geometry.setDrawRange(0, n);
    pos.needsUpdate = true; col.needsUpdate = true;
  }

  function buildDistLines3d() {
    const THREE = window.THREE;
    for (let i = 0; i < 4; i++) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(6), 3));
      const mat = new THREE.LineBasicMaterial({ color: 0xe0c068, transparent: true, opacity: 0.4 });
      const line = new THREE.Line(geo, mat); line.visible = false;
      scene.add(line); distLineMeshes.push(line);
    }
  }

  function updateDistLines3d() {
    const tp = p2t(S.dx, S.dy, S.dz);
    for (let i = 0; i < 4; i++) {
      const a = S.anchors[i], ap = p2t(a[0], a[1], a[2]);
      const pos = distLineMeshes[i].geometry.attributes.position;
      pos.setXYZ(0, ap[0], ap[1], ap[2]);
      pos.setXYZ(1, tp[0], tp[1], tp[2]);
      pos.needsUpdate = true;
      distLineMeshes[i].visible = showDistLines;
    }
  }

  function updateScene3d(now) {
    if (!scene) return;
    updateAnchorPos3d();
    updateTargetPos3d();
    updateTagPos3d();
    updateTrail3d(now);
    updateDistLines3d();
  }

  function render3d(now) {
    if (!renderer || !scene || !camera3d) return;
    if (camAnim) {
      const t = Math.min(1, (now - camAnim.start) / camAnim.duration);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      camera3d.position.lerpVectors(camAnim.from, camAnim.to, ease);
      controls3d.target.lerpVectors(camAnim.fromTarget, camAnim.toTarget, ease);
      camera3d.fov = camAnim.fromFov + (camAnim.toFov - camAnim.fromFov) * ease;
      if (camAnim.fromUp && camAnim.toUp) {
        camera3d.up.lerpVectors(camAnim.fromUp, camAnim.toUp, ease).normalize();
      }
      camera3d.updateProjectionMatrix();
      if (t >= 1) { const cb = camAnim.onComplete; camAnim = null; if (cb) cb(); }
    }
    controls3d.update();
    updateScene3d(now);
    renderer.render(scene, camera3d);
  }

  /* ---- 模式切换 ---- */
  function switchTo3d() {
    if (mode3d) return;
    camAnim = null;
    loadThreeJS().then(() => {
      mode3d = true;
      updateModeSwitchUI();
      document.getElementById('trailCanvas3d').style.display = 'block';
      canvas.style.display = 'none';
      renderer.setSize(W, H); renderer.setPixelRatio(dpr);
      const startState = get2dLikeCameraState();
      const endState = get3dDefaultCameraState();
      setCameraState(startState);
      camAnim = {
        from: startState.pos.clone(),
        to: endState.pos.clone(),
        fromTarget: startState.target.clone(),
        toTarget: endState.target.clone(),
        fromFov: startState.fov,
        toFov: endState.fov,
        fromUp: startState.up.clone(),
        toUp: endState.up.clone(),
        start: performance.now(), duration: 1000,
        onComplete: () => { controls3d.enabled = true; }
      };
    }).catch(() => {
      console.error('3D 模式加载失败，请检查网络连接');
    });
  }

  let switchingTo2d = false;

  function switchTo2d() {
    if (!mode3d || switchingTo2d) return;
    switchingTo2d = true;
    updateModeSwitchUI();
    controls3d.enabled = false;
    const endState = get2dLikeCameraState();
    camAnim = {
      from: camera3d.position.clone(),
      to: endState.pos.clone(),
      fromTarget: controls3d.target.clone(),
      toTarget: endState.target.clone(),
      fromFov: camera3d.fov,
      toFov: endState.fov,
      fromUp: camera3d.up.clone(),
      toUp: endState.up.clone(),
      start: performance.now(), duration: 1000,
      onComplete: () => {
        mode3d = false;
        switchingTo2d = false;
        camera3d.up.set(0, 0, -1);
        document.getElementById('trailCanvas3d').style.display = 'none';
        canvas.style.display = 'block';
        updateModeSwitchUI();
      }
    };
  }

  function updateModeSwitchUI() {
    const sw = document.getElementById('modeSwitch');
    const opts = sw.querySelectorAll('.mode-opt');
    sw.setAttribute('data-mode', mode3d ? '3d' : '2d');
    opts[0].classList.toggle('active', !mode3d);
    opts[1].classList.toggle('active', mode3d);
  }

  /* ==========================================
     启动
     ========================================== */
  function init() {
    new ResizeObserver(()=>resize()).observe(document.body); resize();
    // Canvas 拖拽事件
    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('mouseleave', onPointerUp);
    buildAnchors();
    setupTargetInputs();
    setupControls();
    document.getElementById('btnReset').addEventListener('click', resetDefaults);

    /* 模式切换 */
    document.getElementById('modeSwitch').addEventListener('click', function(e) {
      const opt = e.target.closest('.mode-opt');
      if (!opt) return;
      if (opt.dataset.mode === '3d' && !mode3d) switchTo3d();
      else if (opt.dataset.mode === '2d' && mode3d) switchTo2d();
    });

    /* 测距连线开关 */
    document.getElementById('showDistLines').addEventListener('change', function() {
      showDistLines = this.checked;
    });

    fetchSt();
    setInterval(fetchSt, 200);
    requestAnimationFrame(tick);
  }

  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();

})();
</script>
</body>
</html>
